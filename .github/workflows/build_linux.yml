# Linux x86_64 build of MuseScore (official CI scripts) with SSE3 baseline — no SSE4.
# Based on musescore/MuseScore .github/workflows/build_linux.yml

name: Build MuseScore Linux

on:
  workflow_dispatch:
    inputs:
      app_ref:
        description: MuseScore git ref
        default: v4.7.3
        type: string
      build_mode:
        description: 'Build mode: devel, nightly, testing, stable'
        default: devel
        type: string

permissions:
  contents: read

concurrency:
  group: musescore-linux-${{ github.ref }}
  cancel-in-progress: false

env:
  CPU_FLAGS: -march=x86-64 -mtune=generic -msse3

jobs:
  build:
    # MuseScore AppImage packaging expects OpenSSL 1.1 (libssl.so.1.1), which is
    # available on 22.04 but not on 24.04. Upstream linux_x64 CI uses 22.04.
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          repository: musescore/MuseScore
          ref: ${{ inputs.app_ref }}
          submodules: recursive

      - name: Configure workflow
        env:
          BUILD_MODE_INPUT: ${{ inputs.build_mode }}
        run: |
          bash ./buildscripts/ci/tools/make_build_mode_env.sh -e workflow_dispatch -m "${BUILD_MODE_INPUT}"
          BUILD_MODE=$(cat ./build.artifacts/env/build_mode.env)
          bash ./buildscripts/ci/tools/make_build_number.sh
          BUILD_NUMBER=$(cat ./build.artifacts/env/build_number.env)

          UPLOAD_ARTIFACT_NAME="MU4_${BUILD_NUMBER}_Lin_x86_64_sse3"

          echo "BUILD_MODE=${BUILD_MODE}" | tee -a "$GITHUB_ENV"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" | tee -a "$GITHUB_ENV"
          echo "UPLOAD_ARTIFACT_NAME=${UPLOAD_ARTIFACT_NAME}" | tee -a "$GITHUB_ENV"
          echo "DO_PLACEHOLDER_TRANSLATIONS=$([[ "${BUILD_MODE}" == nightly || "${BUILD_MODE}" == devel ]] && echo true || echo false)" | tee -a "$GITHUB_ENV"

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ubuntu-22.04-x86_64-ccache-
          restore-keys: ubuntu-22.04-x86_64-ccache-

      - name: Setup ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          bash ./buildscripts/ci/tools/setup_ccache_config.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qt5compat qtnetworkauth qtshadertools qtwebsockets
          cache: true

      - name: Setup environment
        run: bash ./buildscripts/ci/linux/setup.sh --arch x86_64 --build-pipewire

      - name: Apply SSE3 CPU flags (no SSE4)
        env:
          CPU_FLAGS: ${{ env.CPU_FLAGS }}
        run: |
          cat >> "${HOME}/build_tools/environment.sh" <<EOF

          export CFLAGS="\${CFLAGS:-} ${CPU_FLAGS}"
          export CXXFLAGS="\${CXXFLAGS:-} ${CPU_FLAGS}"
          export CMAKE_C_FLAGS="\${CMAKE_C_FLAGS:-} ${CPU_FLAGS}"
          export CMAKE_CXX_FLAGS="\${CMAKE_CXX_FLAGS:-} ${CPU_FLAGS}"
          EOF

      - name: Generate _en.ts files
        env:
          LUPDATE_ARGS: ''
          POSTPROCESS_ARGS: ${{ env.DO_PLACEHOLDER_TRANSLATIONS == 'true' && '--generate-placeholder-translations' || '' }}
        run: bash ./tools/translations/run_lupdate.sh

      - name: Register gcc problem matcher
        run: echo "::add-matcher::.github/problem_matchers/gcc.json"

      - name: Build
        env:
          CFLAGS: ${{ env.CPU_FLAGS }}
          CXXFLAGS: ${{ env.CPU_FLAGS }}
          CMAKE_C_FLAGS: ${{ env.CPU_FLAGS }}
          CMAKE_CXX_FLAGS: ${{ env.CPU_FLAGS }}
        run: |
          bash ./buildscripts/ci/linux/build.sh \
            -n "${{ env.BUILD_NUMBER }}" \
            --arch x86_64 \
            --build-pipewire

      - name: Show ccache stats
        if: always()
        run: ccache -sv || true

      - name: Package
        run: bash ./buildscripts/ci/linux/package.sh --arch x86_64 --build-pipewire

      - name: Checksum
        run: bash ./buildscripts/ci/tools/checksum.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.UPLOAD_ARTIFACT_NAME }}
          path: ./build.artifacts/
          retention-days: 90

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          key: ${{ steps.restore-ccache.outputs.cache-primary-key }}-${{ github.run_id }}
          path: ${{ github.workspace }}/.ccache
