# Adapted from musescore/MuseScore .github/workflows/build_linux.yml
# - linux x86_64 only (no arm64)
# - SSE3 CPU baseline (no SSE4) for older VPS CPUs
# - No Sentry / FTP publish / Transifex (not needed for KeyGenius)
#
# Trigger: Actions → "Build MuseScore 4 (SSE3)" → Run workflow
# Artifact: musescore4-sse3-linux-x64.tar.gz → install on VPS with scripts/install-musescore4.sh

name: Build MuseScore 4 (SSE3)

on:
  workflow_dispatch:
    inputs:
      app_ref:
        description: 'MuseScore git ref (branch or tag)'
        required: false
        default: 'v4.4.2'
        type: string
      qt_version:
        description: 'Qt version (6.2.4 for v4.4.x, 6.10.2 for main)'
        required: false
        default: '6.2.4'
        type: string
      build_mode:
        description: 'Build mode: devel, nightly, testing, stable'
        required: false
        default: 'devel'
        type: string
      dockwidgets_v2:
        description: 'Use KDDockWidgets v2: ON/OFF'
        required: false
        default: 'OFF'
        type: string

permissions:
  contents: read

concurrency:
  group: musescore4-sse3-${{ github.ref }}
  cancel-in-progress: false

env:
  CPU_FLAGS: -march=x86-64 -mtune=generic -msse3

jobs:
  build:
    name: linux x64
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    defaults:
      run:
        working-directory: MuseScore

    steps:
      - name: Checkout KeyGenius scripts
        uses: actions/checkout@v4
        with:
          path: keygenius

      - name: Clone MuseScore
        uses: actions/checkout@v4
        with:
          repository: musescore/MuseScore
          ref: ${{ inputs.app_ref || 'v4.4.2' }}
          path: MuseScore
          submodules: recursive

      - name: Configure workflow
        env:
          BUILD_MODE_INPUT: ${{ inputs.build_mode || 'devel' }}
        run: |
          bash ./buildscripts/ci/tools/make_build_mode_env.sh -e workflow_dispatch -m "${BUILD_MODE_INPUT}"
          BUILD_MODE=$(cat ./build.artifacts/env/build_mode.env)
          bash ./buildscripts/ci/tools/make_build_number.sh
          BUILD_NUMBER=$(cat ./build.artifacts/env/build_number.env)

          ADD_INFO="_sse3"
          UPLOAD_ARTIFACT_NAME="MU4_${BUILD_NUMBER}_Lin_x86_64_sse3"

          echo "BUILD_MODE=${BUILD_MODE}" | tee -a "$GITHUB_ENV"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" | tee -a "$GITHUB_ENV"
          echo "UPLOAD_ARTIFACT_NAME=${UPLOAD_ARTIFACT_NAME}" | tee -a "$GITHUB_ENV"
          echo "DO_PLACEHOLDER_TRANSLATIONS=$([[ "${BUILD_MODE}" == nightly || "${BUILD_MODE}" == devel ]] && echo true || echo false)" | tee -a "$GITHUB_ENV"

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: musescore-sse3-${{ runner.os }}-x86_64-ccache-
          restore-keys: musescore-sse3-${{ runner.os }}-x86_64-ccache-

      - name: Setup ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          bash ./buildscripts/ci/tools/setup_ccache_config.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version || '6.2.4' }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qt5compat qtnetworkauth qtshadertools qtwebsockets
          cache: true

      - name: Detect CI build flags for this MuseScore ref
        run: |
          EXTRA_SETUP_ARGS=""
          EXTRA_BUILD_ARGS=""
          EXTRA_PACKAGE_ARGS=""
          if grep -q '\-\-build-pipewire' buildscripts/ci/linux/setup.sh 2>/dev/null; then
            EXTRA_SETUP_ARGS="--build-pipewire"
            EXTRA_BUILD_ARGS="--build-pipewire"
            EXTRA_PACKAGE_ARGS="--build-pipewire"
          fi
          if grep -q 'dockwidgets_v2' buildscripts/ci/linux/build.sh 2>/dev/null; then
            EXTRA_BUILD_ARGS="${EXTRA_BUILD_ARGS} --dockwidgets_v2 ${{ inputs.dockwidgets_v2 == 'ON' && 'ON' || 'OFF' }}"
          fi
          echo "EXTRA_SETUP_ARGS=${EXTRA_SETUP_ARGS}" >> "$GITHUB_ENV"
          echo "EXTRA_BUILD_ARGS=${EXTRA_BUILD_ARGS}" >> "$GITHUB_ENV"
          echo "EXTRA_PACKAGE_ARGS=${EXTRA_PACKAGE_ARGS}" >> "$GITHUB_ENV"

      - name: Setup environment
        run: bash ./buildscripts/ci/linux/setup.sh --arch x86_64 ${EXTRA_SETUP_ARGS}

      - name: Force SSE3 CPU baseline (no SSE4)
        run: bash "${{ github.workspace }}/keygenius/.github/scripts/musescore-sse3-env.sh"

      - name: Generate _en.ts files
        env:
          LUPDATE_ARGS: ''
          POSTPROCESS_ARGS: ${{ env.DO_PLACEHOLDER_TRANSLATIONS == 'true' && '--generate-placeholder-translations' || '' }}
        run: bash ./tools/translations/run_lupdate.sh

      - name: Register gcc problem matcher
        run: echo "::add-matcher::.github/problem_matchers/gcc.json"

      - name: Build
        env:
          CFLAGS: ${{ env.CPU_FLAGS }}
          CXXFLAGS: ${{ env.CPU_FLAGS }}
          CMAKE_C_FLAGS: ${{ env.CPU_FLAGS }}
          CMAKE_CXX_FLAGS: ${{ env.CPU_FLAGS }}
        run: |
          C_URL=''
          bash ./buildscripts/ci/linux/build.sh \
            -n "${{ env.BUILD_NUMBER }}" \
            --crash_log_url "${C_URL}" \
            --arch x86_64 \
            ${EXTRA_BUILD_ARGS}

      - name: Show ccache stats
        if: always()
        run: ccache -sv || true

      - name: Package AppImage
        run: bash ./buildscripts/ci/linux/package.sh --arch x86_64 ${EXTRA_PACKAGE_ARGS}

      - name: Package headless tarball for VPS
        run: |
          INSTALL_DIR="$(cat build.release/PREFIX.txt)"
          OUT="${{ github.workspace }}/musescore4-sse3-linux-x64.tar.gz"
          tar -czf "${OUT}" -C "${INSTALL_DIR}" .
          echo "Created ${OUT} ($(du -h "${OUT}" | cut -f1))"
          xvfb-run -a "${INSTALL_DIR}/bin/mscore" --version || true

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.UPLOAD_ARTIFACT_NAME }}
          path: MuseScore/build.artifacts/
          retention-days: 90

      - name: Upload VPS install tarball
        uses: actions/upload-artifact@v4
        with:
          name: musescore4-sse3-linux-x64
          path: musescore4-sse3-linux-x64.tar.gz
          retention-days: 90

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          key: musescore-sse3-${{ runner.os }}-x86_64-ccache-${{ github.run_id }}
          path: ${{ github.workspace }}/.ccache
